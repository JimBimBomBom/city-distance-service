services:
    cds-app:
        build:
            context: .
            dockerfile: Dockerfile.App
        container_name: city_distance_service_app
        env_file: 
            - path: "DefaultAppEnv.env"
              required: true
            - path: "ProductionAppEnv.env"
              required: false
        ports:
            - "8080:8080"
        depends_on:
            cds-db:
                condition: service_started
            cds-elasticsearch:
                condition: service_healthy
        networks:
            - cdsNetwork
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health_check"]
            interval: 10s
            timeout: 5s
            retries: 30
            start_period: 60s

    cds-db:
        build:
            context: .
            dockerfile: Dockerfile.MySQL
        container_name: cds_mysql_db
        env_file: 
            - path: "DefaultDatabaseEnv.env"
              required: true
            - path: "ProductionDatabaseEnv.env"
              required: false
        networks:
            - cdsNetwork
        restart: unless-stopped
        
    # Elasticsearch (Stateless - index rebuilt from MySQL on startup)
    cds-elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
        container_name: elasticsearch
        environment:
            - ELASTIC_PASSWORD=testPassword123
            - node.name=elasticsearch
            - discovery.type=single-node
            - bootstrap.memory_lock=true
            - "ES_JAVA_OPTS=-Xms512m -Xmx512m"  # Reduced from 1GB for faster startup
            - xpack.security.enabled=false
            - http.max_content_length=200mb
            - http.cors.enabled=true
            - cluster.routing.allocation.disk.threshold_enabled=true
            - cluster.routing.allocation.disk.watermark.low=95%
            - cluster.routing.allocation.disk.watermark.high=97%
            - cluster.routing.allocation.disk.watermark.flood_stage=98%
        ulimits:
            memlock:
                soft: -1
                hard: -1
        ports:
            - "9200:9200"
        networks:
            - cdsNetwork
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 15
            start_period: 40s
    
    # Caddy Reverse Proxy
    caddy:
        build: 
            context: .
            dockerfile: Dockerfile.Caddy
        container_name: caddy
        env_file:
            - .caddy.env
        environment:
            - TZ=Europe/London
        ports:
            - "8443:8443" 
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile
        networks:
            - cdsNetwork
        restart: unless-stopped

    # Data Generator Service - fetches Wikidata and serves SQL via HTTP
    cds-datagenerator:
        build:
            context: .
            dockerfile: Dockerfile.DataGenerator
        container_name: city_distance_data_generator
        env_file: 
            - path: "DefaultDataGeneratorEnv.env"
              required: false
        environment:
            - APP_LANGUAGES_ENDPOINT=http://cds-app:8080/languages
            - APP_RELOAD_ENDPOINT=http://cds-app:8080/admin/reload-from-generator
            - DATA_DIRECTORY=/app/data
        # Port 5000 is internal only - no host mapping needed
        # App accesses generator via Docker network (cdsNetwork)
        depends_on:
            cds-app:
                condition: service_started
        networks:
            - cdsNetwork
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:5000/health_check"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

networks:
    cdsNetwork: {}
