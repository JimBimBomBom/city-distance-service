name: CI

on:
  push:
    branches-ignore:
      - 'v*.*.*'
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  APP_WORKING_DIRECTORY: ./CityDistanceService/

jobs:
  build-and-unit-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ${{ env.APP_WORKING_DIRECTORY }}

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: ${{ env.APP_WORKING_DIRECTORY }}

      - name: Run Unit Tests
        run: dotnet test --no-build --verbosity normal --configuration Release
        working-directory: ${{ env.APP_WORKING_DIRECTORY }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ${{ env.APP_WORKING_DIRECTORY }}

      - name: Create dummy Caddy env file
        run: |
          echo "# Dummy env file for CI" > .caddy.env
          echo "CF_API_TOKEN=dummy" >> .caddy.env
        working-directory: ${{ env.APP_WORKING_DIRECTORY }}

      - name: Build and start services (without Caddy)
        env:
          DATABASE_CONNECTION_STRING: ${{ secrets.DATABASE_CONNECTION_STRING }}
          AUTH_USERNAME: ${{ secrets.AUTH_USERNAME }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
        run: docker compose up --build -d app db elasticsearch
        working-directory: ${{ env.APP_WORKING_DIRECTORY }}

      - name: Wait for services to initialize
        run: sleep 40

      - name: Verify services are running
        run: |
          echo "=== Docker Compose Status ==="
          docker compose ps
          
          echo ""
          echo "=== App Container Logs (last 50 lines) ==="
          APP_LOGS=$(docker compose logs --tail=50 app 2>&1 || true)
          echo "$APP_LOGS"
          
          echo ""
          echo "=== Container Health Status ==="
          docker inspect --format='{{.State.Status}} - Health: {{.State.Health.Status}}' city_distance_service_app || docker inspect --format='{{.State.Status}}' city_distance_service_app
          
          echo ""
          echo "=== Testing /health_check endpoint (HTTP on port 8080) ==="
          # Try to reach the app directly without Caddy
          for i in {1..10}; do
            echo "Attempt $i..."
            if curl -sf http://localhost:8080/health_check; then
              echo ""
              echo "✅ Health check PASSED"
              exit 0
            fi
            sleep 3
          done
          
          echo ""
          echo "❌ Health check FAILED - App did not become healthy"
          echo "Final app logs:"
          docker compose logs --tail=30 app || true
          exit 1

      - name: Cleanup services
        if: always()
        run: docker compose down
        working-directory: ${{ env.APP_WORKING_DIRECTORY }}
