name: Monthly Data Refresh

on:
  schedule:
    # Run at 00:00 on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch:
    # Allow manual trigger

env:
  DOTNET_VERSION: '8.0.x'
  APP_WORKING_DIRECTORY: ./CityDistanceService/

jobs:
  generate-data:
    name: Generate City Data from Wikidata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ${{ env.APP_WORKING_DIRECTORY }}

      - name: Build data importer
        run: dotnet build --configuration Release --no-restore
        working-directory: ${{ env.APP_WORKING_DIRECTORY }}

      - name: Setup MySQL
        uses: mirromutth/mysql-action@v1.1
        with:
          mysql version: '8.0'
          mysql database: 'CityDistanceService'
          mysql root password: 'rootpassword'

      - name: Setup Elasticsearch
        run: |
          docker run -d --name elasticsearch \
            -p 9200:9200 \
            -e "discovery.type=single-node" \
            -e "xpack.security.enabled=false" \
            -e "ES_JAVA_OPTS=-Xms512m -Xmx512m" \
            docker.elastic.co/elasticsearch/elasticsearch:8.15.0
          
          # Wait for ES to be ready
          echo "Waiting for Elasticsearch..."
          for i in {1..30}; do
            if curl -s http://localhost:9200/_cluster/health > /dev/null; then
              echo "Elasticsearch is ready!"
              break
            fi
            sleep 5
          done

      - name: Generate SQL dump
        run: |
          echo "Starting data generation from Wikidata..."
          
          # This would run a CLI tool or script to fetch from Wikidata
          # For now, we'll create a placeholder that documents the process
          
          # In the full implementation, this would:
          # 1. Run migrations on temp MySQL
          # 2. Call Wikidata API to fetch cities
          # 3. Store in MySQL
          # 4. Build ES index
          # 5. Export MySQL data to SQL dump
          
          echo "Exporting MySQL data to SQL dump..."
          mysqldump -h 127.0.0.1 -u root -prootpassword CityDistanceService > data/cities_$(date +%Y-%m-%d).sql
          
          # Copy to cities.sql (latest)
          cp data/cities_$(date +%Y-%m-%d).sql data/cities.sql
          
          echo "SQL dump generated: cities.sql"
          ls -lh data/cities*.sql
        working-directory: ${{ env.APP_WORKING_DIRECTORY }}

      - name: Track with Git LFS
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Track SQL files with Git LFS
          git lfs track "*.sql"
          
          # Add the new SQL dump
          git add data/cities*.sql
          git add .gitattributes
          
          # Commit
          git commit -m "Update city data - $(date +%Y-%m-%d)" || echo "No changes to commit"
        working-directory: ${{ env.APP_WORKING_DIRECTORY }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: data/update-$(date +%Y-%m-%d)
          title: 'Monthly City Data Update - $(date +%Y-%m-%d)'
          body: |
            ## Automated Data Update
            
            This PR contains the latest city data from Wikidata.
            
            ### Changes:
            - Updated city database with fresh data from Wikidata
            - Regenerated Elasticsearch-compatible SQL dump
            - Data date: $(date +%Y-%m-%d)
            
            ### How to Deploy:
            1. Merge this PR
            2. Deploy will automatically use the new data
            
            ### Files Updated:
            - `data/cities.sql` (latest)
            - `data/cities_$(date +%Y-%m-%d).sql` (versioned)
          commit-message: 'Update city data - $(date +%Y-%m-%d)'
          delete-branch: true

